app = "confidia"
primary_region = "lax"

[processes]
web = "node apps/web/.next/standalone/apps/web/server.js"
api = "node apps/api/dist/server.js"
worker = "node apps/worker/dist/worker.js"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1
processes = ["web"]

[[services]]
internal_port = 3001
processes = ["api"]
protocol = "tcp"

[[services.ports]]
handlers = ["http"]
port = 80

[[services.ports]]
handlers = ["tls", "http"]
port = 443
